kind = "web"
previewPath = "/"
title = "Marketing Team Builder"
version = "1.0.0"
id = "artifacts/team-builder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21127

[services.development]
run = "pnpm --filter @workspace/team-builder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/team-builder", "run", "build" ]
publicDir = "artifacts/team-builder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21127"
BASE_PATH = "/"
